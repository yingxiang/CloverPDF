name: CloverPDF
options:
  bundleIdPrefix: com.lingchen
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    ONLY_ACTIVE_ARCH: YES

targets:
  CloverPDF:
    type: application
    platform: macOS
    sources:
      - path: CloverPDF
        excludes:
          - "Entitlements/**"
    resources:
      - path: CloverPDF/Resources
      - path: converter/cloverpdf_converter.py
    postBuildScripts:
      - name: Embed Converter Helper
        script: bash "$SRCROOT/scripts/embed_converter.sh"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lingchen.cloverpdf
        PRODUCT_NAME: CloverPDF
        INFOPLIST_FILE: CloverPDF/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: CloverPDF/Entitlements/CloverPDF.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - sdk: PDFKit.framework
      - sdk: Security.framework
      - sdk: StoreKit.framework

  CloverPDFTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CloverPDFTests
    dependencies:
      - target: CloverPDF
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lingchen.cloverpdf.tests

schemes:
  CloverPDF:
    build:
      targets:
        CloverPDF: all
        CloverPDFTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CloverPDFTests
    archive:
      config: Release
